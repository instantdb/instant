[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "instantdb"
dynamic = ["version"]
description = "Server-side Python SDK for InstantDB — the Modern Firebase"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "Instant" }]
keywords = ["instantdb", "instant", "database", "realtime", "admin"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Typing :: Typed",
    "Intended Audience :: Developers",
]
dependencies = [
    "httpx>=0.27",
    "httpx-sse>=0.4",
    "pydantic>=2",
    "cryptography>=42",
]

[project.urls]
Homepage = "https://www.instantdb.com"
Documentation = "https://www.instantdb.com/docs"
Repository = "https://github.com/instantdb/instant"
Issues = "https://github.com/instantdb/instant/issues"

[tool.hatch.version]
source = "regex"
path = "../version/src/version.ts"
pattern = "version\\s*=\\s*['\"]v(?P<version>[^'\"]+)['\"]"

[tool.hatch.build.targets.wheel]
packages = ["src/instantdb"]

# No [tool.hatch.build.targets.sdist] — we ship wheel only. The package
# is pure-Python (py3-none-any), so the wheel is universal and pip never
# falls back to sdist. Skipping sdist also sidesteps the hatch-version
# path resolution issue: [tool.hatch.version].path reaches outside the
# package directory (`../version/src/version.ts`), which works from the
# dev tree but not from an unpacked sdist.

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.6",
    "mypy>=1.10",
    "unasync>=0.6",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]
ignore = [
    "E501",  # line length; handled by formatter
    "B008",  # function call in argument defaults (Pydantic patterns)
]

[tool.mypy]
strict = true
python_version = "3.10"
files = ["src/instantdb"]
# HTTP responses parse as Any (untyped JSON); typing every result["..."] access
# is noise without value. Disable just this one strict-mode warning.
warn_return_any = false
