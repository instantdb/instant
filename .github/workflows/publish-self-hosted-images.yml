name: Publish self-hosted Docker images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-self-hosted-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/instantdb/dashboard
            image_name: dashboard
            context: ./client
            file: ./client/Dockerfile.www
            platform: linux/amd64
            platform_tag: amd64
            runner: ubuntu-latest
          - image: ghcr.io/instantdb/server
            image_name: server
            context: ./server
            file: ./server/Dockerfile.self-hosted
            platform: linux/amd64
            platform_tag: amd64
            runner: ubuntu-latest
          - image: ghcr.io/instantdb/dashboard
            image_name: dashboard
            context: ./client
            file: ./client/Dockerfile.www
            platform: linux/arm64
            platform_tag: arm64
            runner: ubuntu-24.04-arm
          - image: ghcr.io/instantdb/server
            image_name: server
            context: ./server
            file: ./server/Dockerfile.self-hosted
            platform: linux/arm64
            platform_tag: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.sha }}-${{ matrix.platform_tag }}
          cache-from: type=registry,ref=${{ matrix.image }}:cache-${{ matrix.platform_tag }}
          cache-to: type=registry,ref=${{ matrix.image }}:cache-${{ matrix.platform_tag }},mode=max,image-manifest=true,oci-mediatypes=true,compression=zstd

  publish:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/instantdb/dashboard
          - image: ghcr.io/instantdb/server
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.image }}:latest \
            -t ${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.image }}:${{ github.sha }}-amd64 \
            ${{ matrix.image }}:${{ github.sha }}-arm64
