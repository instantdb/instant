services:
  web:
    image: IMAGE_REPLACE_ME
    environment:
      - BEANSTALK_PORT=80
      - PRODUCTION=true
      # Internal load balancer
      - HONEYCOMB_ENDPOINT=http://refinery.us-east-1.elasticbeanstalk.com:8082
    env_file:
      - .env
      # Generated by .platform/hooks/prebuild/prebuild.sh
      - hazelcast.env
    network_mode: "host"
    stop_grace_period: 7m
    restart: on-failure
    cap_add:
      - CAP_PERFMON
    # `web` depends_on `vector` so that we don't lose logs on docker compose down
    depends_on:
      - vector
    command: sh -c 'java $${JAVA_OPTS} --add-modules java.se --add-exports java.base/jdk.internal.ref=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/sun.nio.ch=ALL-UNNAMED --add-opens java.management/sun.management=ALL-UNNAMED --add-opens jdk.management/com.sun.management.internal=ALL-UNNAMED -XX:+UnlockDiagnosticVMOptions -XX:+DebugNonSafepoints -Djdk.attach.allowAttachSelf -Djava.awt.headless=true -Dcom.sun.management.jmxremote.port=10001 -Dcom.sun.management.jmxremote.rmi.port=10001 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -XX:StartFlightRecording=disk=true,maxsize=1G,name=instant,filename=instant_$(date +%s%N).jfr -Dcom.sun.management.jmxremote.local.only=false -Djava.rmi.server.hostname=localhost -server -jar target/instant-standalone.jar'

  vector:
    # Mirrored from timberio/vector:0.56.0-alpine into our private ECR so
    # we don't depend on Docker Hub at deploy time. Bump the tag with
    # `scripts/mirror_vector.sh --version <new-tag>` first, then change
    # both this line and the matching one in .github/workflows/clojure.yml.
    image: 597134865416.dkr.ecr.us-east-1.amazonaws.com/instant-vector@sha256:3affd68215cbe72da19940b16b0c37919ba819ada34866ee5179fd97bbe4430e
    restart: unless-stopped
    network_mode: "host"
    # 1m gives the final S3 multipart upload comfortable headroom after the
    # JVM's drain completes and Compose sends SIGTERM here.
    stop_grace_period: 1m
    environment:
      # Creds come from the EC2 instance role; AWS_REGION just hints the SDK.
      AWS_REGION: us-east-1
    env_file:
      # Generated by .platform/hooks/prebuild/prebuild.sh — provides INSTANCE_ID.
      - vector.env
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["--config", "/etc/vector/vector.yaml"]
