# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
services:
  postgres:
    image: ghcr.io/instantdb/postgresql:postgresql-16-pg-hint-plan
    ports:
      - "8890:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_USER: ${POSTGRES_USER:-instant}
      POSTGRES_DB: ${POSTGRES_DB:-instant}
    volumes:
      - "backend-db:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-instant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.storage==true
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "shared_preload_libraries=pg_hint_plan"
      - "-c"
      - "random_page_cost=1.1"
  www:
    image: "ghcr.io/instantdb/dashboard:latest"
    environment:
      INSTANT_BACKEND_URL: ${SERVER_URL:? example http://server.localhost}
    networks:
      - caddy
      - default
    deploy:
      labels:
        caddy: ${DASHBOARD_URL:? example http://dash.localhost}
        caddy.reverse_proxy: "{{upstreams 3000}}"
  minio:
    image: minio/minio:latest
    restart: always
    networks:
      - caddy
      - default
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER: "on"
      MINIO_SKIP_CLIENT_CERT_VALIDATION: "on"
    command: server /data --console-address ":9001" --address ":9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      labels:
        caddy: ${S3_PUBLIC_ENDPOINT:? example http://storage.localhost}
        caddy.reverse_proxy: "{{upstreams 9000}}"
      placement:
        constraints:
          - node.labels.storage==true

  createbuckets:
    image: minio/mc
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-instant-bucket}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$$$MINIO_ROOT_USER $$$$MINIO_ROOT_PASSWORD; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/$$$$S3_BUCKET;
      exit"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 20

  server:
    image: "ghcr.io/instantdb/server:swarm-test"
    networks:
      - caddy
      - default
    environment:
      SWARM_SERVICE_NAME: server
      WAL_HISTORY_STORAGE: pg
      DATABASE_URL: "postgresql://${POSTGRES_USER:-instant}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-instant}?sslmode=disable"
      INSTANT_BACKEND_URL: ${SERVER_URL:? example http://server.localhost}
      INSTANT_DASHBOARD_URL: ${DASHBOARD_URL:? example http://dash.localhost}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      POSTMARK_TOKEN: ${POSTMARK_TOKEN:-}
      INSTANT_EMAIL_REPLY_TO: ${INSTANT_EMAIL_REPLY_TO:-}
      INSTANT_DASHBOARD_EMAIL_SENDER_NAME: ${INSTANT_DASHBOARD_EMAIL_SENDER_NAME:-}
      INSTANT_DASHBOARD_EMAIL_SENDER_EMAIL: ${INSTANT_DASHBOARD_EMAIL_SENDER_EMAIL:-}
      INSTANT_APP_EMAIL_SENDER_NAME: ${INSTANT_APP_EMAIL_SENDER_NAME:-}
      INSTANT_APP_EMAIL_SENDER_EMAIL: ${INSTANT_APP_EMAIL_SENDER_EMAIL:-}
      INSTANT_TEAM_EMAIL_SENDER_NAME: ${INSTANT_TEAM_EMAIL_SENDER_NAME:-}
      INSTANT_TEAM_EMAIL_SENDER_EMAIL: ${INSTANT_TEAM_EMAIL_SENDER_EMAIL:-}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:? example http://storage.localhost}
      S3_BUCKET: ${S3_BUCKET:-instant-bucket}
    secrets:
      - source: server_config
        target: /app/resources/config/override.edn
    deploy:
      replicas: 2
      labels:
        caddy: ${SERVER_URL:? ex http://server.localhost}
        caddy.reverse_proxy: "{{upstreams 8888}}"

  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    deploy:
      placement:
        constraints:
          - node.labels.caddy==true

volumes:
  backend-db:
  minio_data:
  caddy_data:

secrets:
  server_config:
    external: true

networks:
  caddy:
    external: true
